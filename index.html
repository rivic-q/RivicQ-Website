    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
      :root {
        --rq-white:       #FFFFFF;
        --rq-bg:          #0A0F1E;
        --rq-surface:     #111827;
        --rq-border:      #1E293B;
        --rq-border-light:#1E293B;

        --rq-primary:     #2563EB;
        --rq-primary-dark:#1D4ED8;
        --rq-primary-light:#1E3A5F;
        --rq-primary-dim: rgba(37,99,235,0.12);

        --rq-accent:      #0BAA8A;
        --rq-accent-dark: #059669;
        --rq-accent-light:#0A2E28;

        --rq-text:        #F1F5F9;
        --rq-text-secondary:#94A3B8;
        --rq-muted:       #64748B;
        --rq-success:     #10B981;
        --rq-warning:     #F59E0B;
        --rq-error:       #EF4444;

        --rq-font-heading: 'Space Grotesk', sans-serif;
        --rq-font-body:   'Inter', system-ui, sans-serif;
        --rq-font-mono:   'JetBrains Mono', monospace;

        --rq-radius-sm:   6px;
        --rq-radius-md:   10px;
        --rq-radius-lg:   16px;
        --rq-radius-xl:   24px;
        --rq-radius-2xl:  32px;

        --rq-shadow-xs:   0 1px 2px rgba(0,0,0,0.3);
        --rq-shadow-sm:   0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
        --rq-shadow-md:   0 4px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.4);
        --rq-shadow-lg:   0 10px 30px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.4);
        --rq-shadow-xl:   0 20px 50px rgba(0,0,0,0.6);
        --rq-shadow-glow: 0 0 30px rgba(37,99,235,0.25);

        --rq-encrypt:     #3B82F6;
        --rq-encrypt-dim: rgba(37,99,235,0.1);
        --rq-blue:        #2563EB;
        --rq-teal:        #0BAA8A;
        --rq-amber:       #F59E0B;
        --rq-code-bg:     #0F172A;

        --rq-transition:  200ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--rq-font-body);
        background: var(--rq-bg);
        color: var(--rq-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        line-height: 1.6;
      }

      ::selection { background: rgba(37,99,235,0.25); color: #fff; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--rq-border); border-radius: 10px; }

      h1, h2, h3, h4, h5, h6 { font-family: var(--rq-font-heading); margin: 0; }

      a { color: var(--rq-primary); text-decoration: none; }
      a:hover { opacity: 0.85; }

      .heading { font-family: var(--rq-font-heading); }
      .body { font-family: var(--rq-font-body); }
      .mono { font-family: var(--rq-font-mono) !important; }

      .page-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .section-padding {
        padding: 80px 0;
      }

      @media (max-width: 768px) {
        .section-padding { padding: 48px 0; }
        .page-container { padding: 0 16px; }
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        .section-padding { padding: 60px 0; }
        .page-container { padding: 0 20px; }
      }

      /* ─── DeepTech Design System Animations ─── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 0 rgba(37,99,235,0); }
        50% { box-shadow: 0 0 30px rgba(37,99,235,0.25); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes dataFlow {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @keyframes hexFloat {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        10% { opacity: 0.08; }
        90% { opacity: 0.08; }
        100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
      }
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes gatePulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      @keyframes qubitFloat {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
        50% { transform: translateY(-12px) scale(1.3); opacity: 0.8; }
      }
      @keyframes encryptPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      @keyframes circuitFlow {
        0% { stroke-dashoffset: 24; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes nodeConnect {
        0% { opacity: 0; }
        50% { opacity: 0.6; }
        100% { opacity: 0; }
      }
      @keyframes gradientOrb {
        0%, 100% { transform: scale(1) translate(0, 0); }
        33% { transform: scale(1.15) translate(3%, 3%); }
        66% { transform: scale(0.9) translate(-2%, -2%); }
      }
      @keyframes cryptoStream {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes scanLine {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      @keyframes dataPulse {
        0%, 100% { border-color: rgba(37,99,235,0.2); box-shadow: 0 0 0 rgba(37,99,235,0); }
        50% { border-color: rgba(37,99,235,0.6); box-shadow: 0 0 20px rgba(37,99,235,0.15); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes particleDrift {
        0% { transform: translate(0, 0) scale(1); opacity: 0; }
        20% { opacity: 0.6; }
        80% { opacity: 0.6; }
        100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
      }
      @keyframes hsmRotate {
        from { transform: rotateY(0deg); }
        to { transform: rotateY(360deg); }
      }
      @keyframes signalPulse {
        0%, 100% { r: 4; opacity: 0.8; }
        50% { r: 12; opacity: 0; }
      }

      .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
      .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
      .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
      .animate-pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
      .animate-spin { animation: spin 1s linear infinite; }
      .animate-blink { animation: blink 1s step-end infinite; }
      .animate-float { animation: float 3s ease-in-out infinite; }
      .animate-shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
      .animate-data-flow { animation: dataFlow 3s linear infinite; }
      .animate-hex-float { animation: hexFloat 20s linear infinite; }
      .animate-gradient-shift { animation: gradientShift 15s ease infinite; background-size: 200% 200%; }
      .animate-circuit-flow { stroke-dasharray: 8 4; animation: circuitFlow 2s linear infinite; }
      .animate-node-connect { animation: nodeConnect 3s ease-in-out infinite; }
      .animate-gradient-orb { animation: gradientOrb 8s ease-in-out infinite; }
      .animate-crypto-stream { animation: cryptoStream 6s linear infinite; }
      .animate-gate-pulse { animation: gatePulse 2s ease-in-out infinite; }
      .animate-node-glow { animation: gatePulse 2s ease-in-out infinite; }
      .animate-entanglement { animation: gatePulse 3s ease-in-out infinite; }
      .animate-qubit-float { animation: qubitFloat 2s ease-in-out infinite; }
      .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .animate-scan-line { animation: scanLine 3s linear infinite; }
      .animate-data-pulse { animation: dataPulse 2s ease-in-out infinite; }
      .animate-glow-pulse { animation: glowPulse 3s ease-in-out infinite; }
      .animate-signal-pulse { animation: signalPulse 2s ease-in-out infinite; }
      .animate-hsm-rotate { animation: hsmRotate 20s linear infinite; }

      /* ─── DeepTech Component Utilities ─── */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        font-family: var(--rq-font-heading); font-weight: 600; font-size: 0.875rem;
        padding: 10px 22px; border-radius: var(--rq-radius-md);
        border: none; cursor: pointer; text-decoration: none; line-height: 1;
        transition: all var(--rq-transition);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--rq-primary), #3B82F6);
        color: var(--rq-white); border: 1px solid rgba(37,99,235,0.3);
      }
      .btn-primary:hover {
        box-shadow: var(--rq-shadow-glow); border-color: rgba(37,99,235,0.6);
        transform: translateY(-1px);
      }
      .btn-secondary {
        background: rgba(255,255,255,0.04); color: var(--rq-text);
        border: 1px solid var(--rq-border);
      }
      .btn-secondary:hover {
        border-color: var(--rq-primary); background: rgba(37,99,235,0.1);
      }
      .btn-accent {
        background: linear-gradient(135deg, var(--rq-accent), #059669);
        color: var(--rq-white); border: 1px solid rgba(11,170,138,0.3);
      }
      .btn-accent:hover {
        box-shadow: 0 0 30px rgba(11,170,138,0.3); border-color: rgba(11,170,138,0.6);
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: transparent; color: var(--rq-text-secondary);
        border: 1px solid transparent;
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.04); color: var(--rq-text);
        border-color: var(--rq-border);
      }
      .btn-sm { padding: 7px 14px; font-size: 0.8rem; }
      .btn-lg { padding: 14px 28px; font-size: 1rem; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .card {
        background: rgba(255,255,255,0.03); border: 1px solid var(--rq-border);
        border-radius: var(--rq-radius-lg); padding: 24px;
        backdrop-filter: blur(8px);
        transition: all var(--rq-transition);
      }
      .card-hover:hover {
        border-color: var(--rq-primary); box-shadow: var(--rq-shadow-glow);
        background: rgba(37,99,235,0.06);
      }
      .card-accent {
        border-color: rgba(37,99,235,0.3);
        background: linear-gradient(135deg, rgba(37,99,235,0.1) 0%, rgba(37,99,235,0.02) 100%);
      }

      .badge {
        display: inline-flex; align-items: center; gap: 4px;
        font-family: var(--rq-font-heading); font-size: 0.7rem; font-weight: 600;
        padding: 3px 10px; border-radius: 100px; text-transform: uppercase;
        letter-spacing: 0.04em; border: 1px solid;
      }
      .badge-primary {
        background: rgba(37,99,235,0.15); color: #60A5FA;
        border-color: rgba(37,99,235,0.3);
      }
      .badge-accent {
        background: rgba(11,170,138,0.15); color: #34D399;
        border-color: rgba(11,170,138,0.3);
      }
      .badge-amber {
        background: rgba(245,158,11,0.15); color: #FBBF24;
        border-color: rgba(245,158,11,0.3);
      }
      .badge-gray {
        background: rgba(255,255,255,0.04); color: var(--rq-muted);
        border-color: var(--rq-border);
      }
      .badge-blue {
        background: rgba(37,99,235,0.15); color: #60A5FA;
        border-color: rgba(37,99,235,0.3);
      }
      .badge-encrypt {
        background: rgba(99,102,241,0.15); color: #818CF8;
        border-color: rgba(99,102,241,0.3);
      }

      .input {
        width: 100%; padding: 10px 14px; font-size: 0.875rem;
        font-family: var(--rq-font-body); color: var(--rq-text);
        background: rgba(255,255,255,0.04); border: 1px solid var(--rq-border);
        border-radius: var(--rq-radius-md); transition: all var(--rq-transition);
        outline: none;
      }
      .input:focus { border-color: var(--rq-primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
      .input::placeholder { color: var(--rq-muted); }

      .label {
        display: block; font-family: var(--rq-font-heading);
        font-size: 0.8rem; font-weight: 600; margin-bottom: 6px;
        color: var(--rq-text);
      }

      .tag {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 10px; border-radius: var(--rq-radius-sm);
        font-size: 0.68rem; font-family: var(--rq-font-mono);
        background: rgba(37,99,235,0.12); color: #60A5FA;
        border: 1px solid rgba(37,99,235,0.2);
      }

      .divider {
        height: 1px; background: var(--rq-border); border: none; margin: 0;
      }

      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0;
        margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
        white-space: nowrap; border: 0;
      }

      .skip-link {
        position: absolute; left: -9999px; top: 0; z-index: 10000;
        padding: 8px 16px; background: var(--rq-primary); color: #fff;
        font-size: 0.85rem; border-radius: 0 0 8px 0; text-decoration: none;
      }
      .skip-link:focus { left: 0; }
      :focus-visible { outline: 2px solid var(--rq-primary); outline-offset: 2px; }

      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
      }
      @media (min-width: 769px) {
        .hide-desktop { display: none !important; }
      }
      @media (min-width: 769px) and (max-width: 1024px) {
        .hide-tablet { display: none !important; }
      }

      /* Footer responsive */
      @media (max-width: 1024px) {
        .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
        .footer-links-grid { grid-template-columns: repeat(3, 1fr) !important; }
      }
      @media (max-width: 600px) {
        .footer-links-grid { grid-template-columns: repeat(2, 1fr) !important; }
      }
    </style>
