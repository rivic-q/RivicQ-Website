    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
      :root {
        --rq-white:       #FFFFFF;
        --rq-bg:          #FAFBFC;
        --rq-surface:     #F1F4F9;
        --rq-border:      #DDE2E8;
        --rq-border-light:#EBEFF3;

        --rq-primary:     #1A56DB;
        --rq-primary-dark:#143FA8;
        --rq-primary-light:#E8EEFE;
        --rq-primary-dim: rgba(26,86,219,0.08);

        --rq-accent:      #0BAA8A;
        --rq-accent-dark: #088B71;
        --rq-accent-light:#E6F8F4;

        --rq-text:        #0E141B;
        --rq-text-secondary:#4A5568;
        --rq-muted:       #8896A6;
        --rq-success:     #059669;
        --rq-warning:     #D97706;
        --rq-error:       #DC2626;

        --rq-font-heading: 'Space Grotesk', sans-serif;
        --rq-font-body:   'Inter', system-ui, sans-serif;
        --rq-font-mono:   'JetBrains Mono', monospace;

        --rq-radius-sm:   6px;
        --rq-radius-md:   10px;
        --rq-radius-lg:   16px;
        --rq-radius-xl:   24px;

        --rq-shadow-xs:   0 1px 2px rgba(0,0,0,0.04);
        --rq-shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        --rq-shadow-md:   0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
        --rq-shadow-lg:   0 10px 30px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
        --rq-shadow-xl:   0 20px 50px rgba(0,0,0,0.08);
        --rq-shadow-glow: 0 0 24px rgba(26,86,219,0.15);

        --rq-transition:  200ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--rq-font-body);
        background: var(--rq-bg);
        color: var(--rq-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
        line-height: 1.6;
      }

      ::selection { background: rgba(26,86,219,0.14); color: var(--rq-text); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--rq-border); border-radius: 10px; }

      h1, h2, h3, h4, h5, h6 { font-family: var(--rq-font-heading); margin: 0; }

      a { color: var(--rq-primary); text-decoration: none; }
      a:hover { opacity: 0.85; }

      .heading { font-family: var(--rq-font-heading); }
      .body { font-family: var(--rq-font-body); }
      .mono { font-family: var(--rq-font-mono) !important; }

      .page-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .section-padding {
        padding: 80px 0;
      }

      @media (max-width: 768px) {
        .section-padding { padding: 48px 0; }
        .page-container { padding: 0 16px; }
      }

      /* ─── Design System Animations ─── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 0 rgba(26,86,219,0); }
        50% { box-shadow: 0 0 20px rgba(26,86,219,0.12); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes dataFlow {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @keyframes hexFloat {
        0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
        10% { opacity: 0.06; }
        90% { opacity: 0.06; }
        100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
      }
      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
      .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
      .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
      .animate-scale-in { animation: scaleIn 0.3s ease-out forwards; }
      .animate-pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
      .animate-spin { animation: spin 1s linear infinite; }
      .animate-blink { animation: blink 1s step-end infinite; }
      .animate-float { animation: float 3s ease-in-out infinite; }
      .animate-shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
      .animate-data-flow { animation: dataFlow 3s linear infinite; }
      .animate-hex-float { animation: hexFloat 20s linear infinite; }
      .animate-gradient-shift { animation: gradientShift 15s ease infinite; background-size: 200% 200%; }

      /* ─── Component Utilities ─── */
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        font-family: var(--rq-font-heading); font-weight: 600; font-size: 0.875rem;
        padding: 10px 22px; border-radius: var(--rq-radius-md);
        border: none; cursor: pointer; text-decoration: none; line-height: 1;
        transition: all var(--rq-transition);
      }
      .btn-primary {
        background: var(--rq-primary); color: var(--rq-white);
      }
      .btn-primary:hover {
        background: var(--rq-primary-dark); box-shadow: var(--rq-shadow-glow);
      }
      .btn-secondary {
        background: var(--rq-surface); color: var(--rq-text);
        border: 1px solid var(--rq-border);
      }
      .btn-secondary:hover {
        border-color: var(--rq-primary); background: var(--rq-primary-light);
      }
      .btn-accent {
        background: var(--rq-accent); color: var(--rq-white);
      }
      .btn-accent:hover {
        background: var(--rq-accent-dark); box-shadow: 0 0 20px rgba(11,170,138,0.2);
      }
      .btn-ghost {
        background: transparent; color: var(--rq-text-secondary);
      }
      .btn-ghost:hover {
        background: var(--rq-surface); color: var(--rq-text);
      }
      .btn-sm { padding: 7px 14px; font-size: 0.8rem; }
      .btn-lg { padding: 14px 28px; font-size: 1rem; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .card {
        background: var(--rq-white); border: 1px solid var(--rq-border);
        border-radius: var(--rq-radius-lg); padding: 24px;
        transition: all var(--rq-transition);
      }
      .card-hover:hover {
        border-color: var(--rq-primary); box-shadow: var(--rq-shadow-md);
      }
      .card-accent {
        border-color: var(--rq-primary);
        background: linear-gradient(135deg, var(--rq-primary-dim) 0%, transparent 100%);
      }

      .badge {
        display: inline-flex; align-items: center; gap: 4px;
        font-family: var(--rq-font-heading); font-size: 0.7rem; font-weight: 600;
        padding: 3px 10px; border-radius: 100px; text-transform: uppercase;
        letter-spacing: 0.04em; border: 1px solid;
      }
      .badge-primary {
        background: var(--rq-primary-light); color: var(--rq-primary);
        border-color: rgba(26,86,219,0.25);
      }
      .badge-accent {
        background: var(--rq-accent-light); color: var(--rq-accent-dark);
        border-color: rgba(11,170,138,0.25);
      }
      .badge-amber {
        background: rgba(217,119,6,0.1); color: var(--rq-warning);
        border-color: rgba(217,119,6,0.25);
      }
      .badge-gray {
        background: var(--rq-surface); color: var(--rq-muted);
        border-color: var(--rq-border);
      }

      .input {
        width: 100%; padding: 10px 14px; font-size: 0.875rem;
        font-family: var(--rq-font-body); color: var(--rq-text);
        background: var(--rq-white); border: 1px solid var(--rq-border);
        border-radius: var(--rq-radius-md); transition: all var(--rq-transition);
        outline: none;
      }
      .input:focus { border-color: var(--rq-primary); box-shadow: 0 0 0 3px var(--rq-primary-dim); }
      .input::placeholder { color: var(--rq-muted); }

      .label {
        display: block; font-family: var(--rq-font-heading);
        font-size: 0.8rem; font-weight: 600; margin-bottom: 6px;
        color: var(--rq-text);
      }

      .tag {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 8px; border-radius: var(--rq-radius-sm);
        font-size: 0.7rem; font-family: var(--rq-font-mono);
        background: var(--rq-primary-dim); color: var(--rq-primary);
      }

      .divider {
        height: 1px; background: var(--rq-border); border: none; margin: 0;
      }

      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0;
        margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
        white-space: nowrap; border: 0;
      }

      .skip-link {
        position: absolute; left: -9999px; top: 0; z-index: 10000;
        padding: 8px 16px; background: var(--rq-primary); color: #fff;
        font-size: 0.85rem; border-radius: 0 0 8px 0; text-decoration: none;
      }
      .skip-link:focus { left: 0; }
      :focus-visible { outline: 2px solid var(--rq-primary); outline-offset: 2px; }

      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
      }
      @media (min-width: 769px) {
        .hide-desktop { display: none !important; }
      }
    </style>
