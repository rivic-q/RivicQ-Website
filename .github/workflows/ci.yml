name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run format check
        run: npm run format:check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        continue-on-error: true

  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_FORM_ENDPOINT: ${{ secrets.VITE_FORM_ENDPOINT }}

      - name: Verify build artifact integrity
        run: |
          echo "=== Build Artifact Verification ==="
          if [ ! -f dist/index.html ]; then echo "ERROR: dist/index.html missing"; exit 1; fi
          if [ ! -d dist/assets ]; then echo "ERROR: dist/assets missing"; exit 1; fi
          JS_COUNT=$(find dist/assets -name '*.js' | wc -l)
          echo "JS chunks: $JS_COUNT"
          CSS_COUNT=$(find dist/assets -name '*.css' | wc -l)
          echo "CSS chunks: $CSS_COUNT"
          echo "Build artifact verification passed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.rivicq.de
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run production readiness check
        run: |
          chmod +x scripts/prod-check.sh
          bash scripts/prod-check.sh

      - name: Deploy to staging server
        run: |
          echo "Deploying to staging..."
          # Staging deployment — uses GitHub Pages artifact for preview
          echo "Staging URL: https://staging.rivicq.de"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://rivicq.de
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run production readiness check
        run: |
          chmod +x scripts/prod-check.sh
          bash scripts/prod-check.sh

      - name: Deploy to production server
        run: |
          echo "Deploying to production (GitHub Pages)..."
          # Production deployment handled by deploy.yml workflow
          # Triggered automatically on push to main branch
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
